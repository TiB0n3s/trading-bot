name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  safety:
    name: Fast safety checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-base.txt
          python -m pip install --no-deps -e .
          python -m pip install pytest ruff

      - name: Compile critical entry points
        run: |
          python -m py_compile \
            app.py \
            ops_check.py \
            decision_policy.py \
            services/slippage_kelly_sizing_service.py \
            services/supervised_prediction_training_service.py \
            services/transformer_authority_model_service.py \
            services/volatile_session_intelligence_service.py

      - name: Run fast safety checks
        run: python run_safety_checks.py
