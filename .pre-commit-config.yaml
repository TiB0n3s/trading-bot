repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        name: Ruff check staged Python files
        args: [--fix]

      - id: ruff-format
        name: Ruff format staged Python files

  - repo: local
    hooks:
      - id: trading-bot-safety-checks
        name: Trading bot fast safety checks
        entry: python3 run_safety_checks.py
        language: system
        pass_filenames: false
        always_run: true
