repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff check staged Python files
        entry: python -m ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff format staged Python files
        entry: python -m ruff format
        language: system
        types: [python]

      - id: trading-bot-safety-checks
        name: Trading bot fast safety checks
        entry: python run_safety_checks.py
        language: system
        pass_filenames: false
        always_run: true
